name: CI — Player Stats Service

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  testes:
    name: Testes (QuarkusTest + RestAssured)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Executar testes
        run: mvn test -B -Dquarkus.test.profile=test
        env:
          TWITCH_CLIENT_ID: placeholder
          TWITCH_CLIENT_SECRET: placeholder
