version: '3.8'

services:

  players-db:
    image: postgres:15-alpine
    container_name: players-db
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: playerstatsdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - players_data:/var/lib/postgresql/data

  player-stats-service:
    build: .
    container_name: player-stats-service
    ports:
      - "8083:8083"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://players-db:5432/playerstatsdb
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
      # Defina suas credenciais da Twitch aqui ou via arquivo .env
      TWITCH_CLIENT_ID: placeholder
      TWITCH_CLIENT_SECRET: placeholder
    depends_on:
      - players-db

volumes:
  players_data:
