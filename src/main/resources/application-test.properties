# Perfil de testes: H2 em memória e URLs fictícias para os REST Clients
quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
quarkus.hibernate-orm.database.generation=drop-and-create

twitch.client-id=test-client-id
twitch.client-secret=test-client-secret

# URLs obrigatórias para o Quarkus inicializar os REST Clients
# Valores fictícios — os clientes nunca são chamados nos testes de leitura
quarkus.rest-client.twitch-api.url=http://localhost:9999
quarkus.rest-client.twitch-auth.url=http://localhost:9999
