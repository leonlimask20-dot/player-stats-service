# --- Aplicação ---
quarkus.application.name=player-stats-service
quarkus.http.port=8083

# --- Banco de dados ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=postgres
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5435/playerstatsdb

# drop-and-create em dev; em produção usar "none" com migrations Flyway
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true

# --- Twitch API ---
# Client ID e Secret obtidos em dev.twitch.tv
twitch.client-id=SEU_CLIENT_ID_AQUI
twitch.client-secret=SEU_CLIENT_SECRET_AQUI
twitch.auth-url=https://id.twitch.tv

# URL base do REST Client da Twitch
quarkus.rest-client.twitch-api.url=https://api.twitch.tv
quarkus.rest-client.twitch-api.scope=javax.enterprise.context.ApplicationScoped

# --- Logs ---
quarkus.log.level=INFO
quarkus.log.category."com.leonlima".level=DEBUG

# --- Swagger / OpenAPI ---
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
quarkus.smallrye-openapi.path=/openapi
mp.openapi.extensions.smallrye.info.title=Player Stats Service
mp.openapi.extensions.smallrye.info.version=1.0.0
mp.openapi.extensions.smallrye.info.description=Serviço de sincronização e consulta de streamers via Twitch API

# --- Timeout do REST Client (evita travamentos se a Twitch API ficar lenta) ---
quarkus.rest-client.twitch-api.connect-timeout=5000
quarkus.rest-client.twitch-api.read-timeout=10000
quarkus.rest-client.twitch-auth.connect-timeout=5000
quarkus.rest-client.twitch-auth.read-timeout=10000
